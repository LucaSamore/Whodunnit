name: Check for conventional commits compliance
on:
  push:
    branches: [main, dev]

  pull_request:
    branches: [main, dev]

jobs:
  check-commits:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v3
      - name: check-conventional-commits
        uses: webiny/action-conventional-commits@v1.3.0